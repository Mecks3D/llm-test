# Config per il run di fumo LUNGO (verifica post-revisione T1-T6): SOLO
# stadio 1, ma con abbastanza storie e step perché l'esattezza dev debba
# SALIRE sopra lo zero. Serve a due cose: (a) confermare empiricamente che
# la catena training->decodifica->grafo impara davvero anche fuori
# dall'overfit del canary; (b) misurare quanti step servono per avvicinare
# la soglia dello stadio 1, l'ancora della stima di durata del curriculum
# completo (decisione 10: run > 2h solo con l'ok di Andrea).
# Non è un config di produzione: non si usa per gli esami del curriculum.

nome_run: v1_fumo_lungo
device: auto
seed_torch: 1337

percorsi:
  lessico: lingua/lessico.tsv
  vocabolario: cervello/vocabolario.json
  dati_dir: dati
  risultati_dir: dati/risultati

dataset:
  ctx: 3072   # invariato: stessa finestra della produzione (decisione 1)
  train_storie: 1000
  dev_storie: 100
  esame_storie: 100
  n_per_tipo: 8

stadi:
  1:
    tipi: [posizione]
    soglia: 0.95
    storie_corte: true

modello:
  n_layer: 8
  n_head: 8
  d_model: 256
  d_ff: 1024
  dropout: 0.1

training:
  batch: 4
  accumulo: 8
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  warmup_step: 200
  grad_clip: 1.0
  max_step: 3000
  intervallo_valutazione: 250
  dev_campione: 50
