# Curriculum a cast crescente, gradino 1/3: 1 solo personaggio (anna),
# storie molto corte (1-3 tick). Idea di Andrea: invece del salto secco a 3
# personaggi di v1_facile.yaml, salire di difficoltà un personaggio alla
# volta, ripartendo ogni volta dal checkpoint del gradino precedente.
#
# Punto di partenza di TUTTO il curriculum: il best-dev di v1_anti (cast
# pieno, selezione anti-scorciatoia), via --pesi-iniziali:
#   python -m cervello.addestra --config configs/v1_grad1.yaml \
#       --pesi-iniziali /percorso/v1_anti/stadio1_best.pt
#
# Run separata: non tocca dati/anti né dati/facile né i checkpoint esistenti.
# Il blocco `modello:` resta IDENTICO a v1_anti.yaml/v1.yaml (stesse shape).

nome_run: v1_grad1
device: auto
seed_torch: 1337

percorsi:
  lessico: lingua/lessico.tsv
  vocabolario: cervello/vocabolario.json
  dati_dir: dati/grad1
  risultati_dir: dati/risultati

dataset:
  ctx: 3072
  train_storie: 2000
  dev_storie: 200
  esame_storie: 200
  n_per_tipo: 8
  cast: [anna]

stadi:
  1:
    tipi: [posizione]
    soglia: 0.95
    storie_corte: {min: 1, max: 3}

modello:
  n_layer: 8
  n_head: 8
  d_model: 256
  d_ff: 1024
  dropout: 0.1

training:
  batch: 4
  accumulo: 8
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  warmup_step: 50
  grad_clip: 1.0
  early_stop: false  # su richiesta di Andrea: arriva sempre a max_step,
                      # non si ferma appena esattezza_dev supera soglia+0.01
  max_step: 1500
  intervallo_valutazione: 200
  dev_campione: 200
