# Curriculum a cast crescente, gradino 2/3: 2 personaggi (anna, piero).
# Riparte dal checkpoint best-dev del gradino 1:
#   python -m cervello.addestra --config configs/v1_grad2.yaml \
#       --pesi-iniziali dati/risultati/v1_grad1/stadio1_best.pt
# (o dal percorso dove hai copiato/scaricato quel checkpoint).
#
# Run separata: non tocca dati/grad1 né i checkpoint del gradino 1.

nome_run: v1_grad2
device: auto
seed_torch: 1337

percorsi:
  lessico: lingua/lessico.tsv
  vocabolario: cervello/vocabolario.json
  dati_dir: dati/grad2
  risultati_dir: dati/risultati

dataset:
  ctx: 3072
  train_storie: 2500
  dev_storie: 200
  esame_storie: 200
  n_per_tipo: 8
  cast: [anna, piero]

stadi:
  1:
    tipi: [posizione]
    soglia: 0.95
    storie_corte: {min: 1, max: 3}

modello:
  n_layer: 8
  n_head: 8
  d_model: 256
  d_ff: 1024
  dropout: 0.1

training:
  batch: 4
  accumulo: 8
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  warmup_step: 50
  grad_clip: 1.0
  max_step: 2500
  intervallo_valutazione: 250
  dev_campione: 200
