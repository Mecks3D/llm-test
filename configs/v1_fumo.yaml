# Config per il run di fumo (FASE2_PIANO.md §10, tappa T6): SOLO stadio 1,
# dataset e step ridotti per verificare in fretta che la pipeline
# dati->modello->loss->checkpoint funzioni prima del run vero (configs/v1.yaml).
# Non è un config di produzione: non si usa per gli esami del curriculum.

nome_run: v1_fumo
device: auto
seed_torch: 1337

percorsi:
  lessico: lingua/lessico.tsv
  vocabolario: cervello/vocabolario.json
  dati_dir: dati
  risultati_dir: dati/risultati

dataset:
  ctx: 3072   # invariato: stessa finestra della produzione (decisione 1)
  train_storie: 200
  dev_storie: 30
  esame_storie: 30
  n_per_tipo: 8

stadi:
  1:
    tipi: [posizione]
    soglia: 0.95
    storie_corte: true

modello:
  n_layer: 8
  n_head: 8
  d_model: 256
  d_ff: 1024
  dropout: 0.1

training:
  batch: 4
  accumulo: 8
  lr: 3.0e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  warmup_step: 50
  grad_clip: 1.0
  max_step: 300
  intervallo_valutazione: 100
  dev_campione: 20
